name: release-please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge for Release PRs
        if: ${{ steps.release.outputs.prs_created }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          echo "$PRS_JSON" | jq -r '.[].number' | while read PR_NUMBER; do
            echo "Enabling auto-merge for PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --repo ${{ github.repository }} --auto --squash
          done
